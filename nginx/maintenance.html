<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>리뉴얼 중 — 한화그린</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Noto Sans KR", "Malgun Gothic", sans-serif;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0a2e1c 0%, #0d5c3a 45%, #1a8f5c 100%);
      color: #fff;
      padding: 2rem 1.5rem;
    }
    .card {
      max-width: 520px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.4rem 1rem;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
      margin-bottom: 0.5rem;
    }
    .note {
      margin-top: 2rem;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.55);
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Website Renewal</span>
    <h1>한화그린 홈페이지<br>리뉴얼 작업 중입니다</h1>
    <p>더 나은 서비스를 위해 홈페이지를 새롭게 준비하고 있습니다.</p>
    <p>잠시 후 다시 방문해 주세요.</p>
    <p class="note">출결 서비스(현장 앱)는 정상 운영됩니다.</p>
  </div>
</body>
</html>
